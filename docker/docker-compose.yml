services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      DATABASE_URL: "file:./data/taskmanager.db"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "change-me-use-openssl-rand-base64-32"
      SOCKET_PORT: "3001"
      SMTP_HOST: "mailpit"
      SMTP_PORT: "1025"
      SMTP_FROM: "Task Manager <noreply@taskmanager.local>"
      SMTP_SECURE: "false"
    volumes:
      - sqlite_data:/app/data
    depends_on:
      mailpit:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/auth/session || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    restart: unless-stopped

volumes:
  sqlite_data:
